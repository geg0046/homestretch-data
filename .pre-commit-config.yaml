repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: validate-data
        name: validate homestretch data
        entry: uv run python scripts/validate.py
        language: system
        pass_filenames: false
        files: ^(data/.*\.json|src/homestretch_data/models/.*\.py)$

      - id: export-schemas
        name: regenerate JSON schemas
        entry: uv run python scripts/export_schemas.py
        language: system
        pass_filenames: false
        files: ^src/homestretch_data/models/.*\.py$
