name: Scheduled scrape

on:
  schedule:
    - cron: "0 6 * * 0"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: scheduled-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.7"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install deps
        run: uv sync --all-groups --locked

      - name: Restore scraper cache
        uses: actions/cache@v4
        with:
          path: .cache
          key: scheduled-scrape-cache-v1

      - name: PokéAPI — forms
        run: uv run python scrapers/pokeapi.py --mode forms --max-dex 1025

      - name: PokéAPI — sources
        run: uv run python scrapers/pokeapi.py --mode sources --max-dex 1025

      - name: PokéAPI — evolutions
        run: uv run python scrapers/pokeapi.py --mode evolutions --max-dex 1025

      - name: Bulbapedia — sources
        run: uv run python scrapers/bulbapedia.py --mode sources --max-dex 1025

      - name: Bulbapedia — evolutions
        run: uv run python scrapers/bulbapedia.py --mode evolutions --max-dex 1025

      - name: Manual seed rows
        run: uv run python scripts/seed_manual_sources.py

      - name: Validate data
        run: uv run python scripts/validate.py

      - name: Summarise diff
        id: diff
        run: |
          {
            echo 'stat<<EOF'
            git diff --stat -- data/ || true
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Open pull request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: scheduled-scrape/run-${{ github.run_number }}
          branch-suffix: timestamp
          commit-message: |
            [data] scheduled scrape refresh

            Co-Authored-By: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          title: "[data] scheduled scrape — run ${{ github.run_id }}"
          body: |
            Weekly scheduled-scrape refresh (run ${{ github.run_id }}).

            ```
            ${{ steps.diff.outputs.stat }}
            ```

            - Triggered by: `${{ github.event_name }}`
            - Workflow: `.github/workflows/scheduled-scrape.yml`

            Review the diff before merging — upstream wikitext edits
            can land unintended rewrites in rare cases.
          labels: |
            automated
            data-refresh
          add-paths: |
            data/
