name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.7"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install deps
        run: uv sync --all-groups --locked

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Validate data
        run: uv run python scripts/validate.py

      - name: Tests
        run: uv run pytest

      - name: Regenerate schemas (should be a no-op)
        run: |
          uv run python scripts/export_schemas.py
          if ! git diff --quiet -- schemas/; then
            echo "Schemas are out of date. Run scripts/export_schemas.py and commit."
            git --no-pager diff -- schemas/
            exit 1
          fi

      - name: pip-audit (CVE scan)
        # CVE-2026-3219 / GHSA-58qw-9mgm-455v — pip mishandles archives
        # that identify as both tar and ZIP. All released pip versions
        # are affected; the upstream fix (pypa/pip#13870) merged on
        # 2026-04-19 but no pip release has been cut yet. Not reachable
        # in our CI (we install from pinned uv.lock, not untrusted tarballs).
        # Remove this flag once Dependabot opens a PR bumping pip past
        # the first fixed release.
        run: uv run pip-audit --skip-editable --ignore-vuln CVE-2026-3219
